<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Santu Job Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="header">

    <div class="headerleft">

        <div class="logo">
            <img src="naukrilogo.webp" alt="logo">
            <p>Naukri Lelo Ji</p>
        </div>

        <a href="#" id="homeBtn">Home</a>
        <a href="#">Prepare</a>
        <a href="#">Participate</a>
        <a href="#">Certification</a>

        <input type="text" id="searchBar" placeholder="Search job title...">

    </div>

    <div class="headerRight">

        <ul>
            <li class="account">
                <a href="#">Account</a>

                <ul class="dropdown">
                    <li><a href="#">Profile</a></li>
                    <li><a href="#">Log In</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </li>
        </ul>

        <img src="My pic.png" alt="profile">

    </div>

</div>


<!-- START PAGE -->
<div class="startScreen" id="startScreen">

    <button id="browseBtn">Browse Jobs</button>
    <button id="postBtn">Post Job</button>

</div>


<!-- JOB FORM -->
<div class="jobForm" id="jobForm">

    <h2>Post Job</h2>

    <input type="text" id="jobTitle" placeholder="Job Title">

    <textarea id="jobDesc" placeholder="Job Description"></textarea>

    <input type="text" id="jobEligibility" placeholder="Eligibility">

    <input type="text" id="jobImage" placeholder="Company Image Path">

    <button id="submitJob">Submit</button>

</div>


<!-- JOB LIST -->
<div class="main" id="mainSection">

    <div id="jobContainer">

        <div class="card">

            <div class="text">

                <h2>Job Details</h2>

                <p>Software Developer</p>

                <h3>Description</h3>
                <p class="desc">Develop scalable applications</p>

                <h3>Eligibility</h3>
                <p class="eligibility">Java, Spring Boot</p>

                <div class="bottom">
                    <button class="updateBtn">Update</button>
                    <button class="deleteBtn">Delete</button>
                </div>

            </div>

            <div class="companyimage">
                <img src="amazon_PNG5.png" alt="company">
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
